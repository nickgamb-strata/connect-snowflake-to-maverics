version: 0.0.1

logger:
  level: debug
  logSessionID: true
  timeFormat: RFC3339Nano
  fieldOrdering:
    enabled: true

http:
  address: 0.0.0.0:9443
  hosts:
    - default: true
      tls: edge-mtls

tls:
  edge-mtls:
    certFile: /etc/maverics/certs/internal-server.pem
    keyFile: /etc/maverics/certs/internal-server-key.pem
    clientAuth: RequireAndVerifyClientCert
    clientCAFiles:
      - /etc/maverics/certs/rootCA.pem
  keycloak:
    caFile: /etc/maverics/certs/rootCA.pem
    minVersion: 1.3

health: {}

session:
  cookie:
    name: maverics_session
  lifetime:
    maxTimeout: 24h
    idleTimeout: 15m
  store:
    type: local

connectors:
  - name: keycloak
    type: oidc
    tls: keycloak
    oidcWellKnownURL: https://keycloak.orchestrator.lab:8443/realms/blueprints/.well-known/openid-configuration
    oauthClientID: ai-identity-gateway-oidc
    oauthClientSecret: <ai_identity_gateway.keycloak_client_secret>
    oauthLoginRedirect:
      urls:
        - https://auth.orchestrator.lab/oidc-callback/keycloak
    oauthLogoutRedirect:
      urls:
        - https://auth.orchestrator.lab/logout/keycloak
    disablePKCE: false
    scopes: openid profile email
    offlineAccess:
      enabled: false

caches:
  - name: oidc-provider-cache
    type: redis
    redis:
      addresses:
        - redis:6379
    encryption:
      disabled: false
      keys:
        current: <ai_identity_gateway.redis_encryption_key_current>
        old:
          - <ai_identity_gateway.redis_encryption_key_old_1>
          - <ai_identity_gateway.redis_encryption_key_old_2>
    hashing:
      keys:
        disabled: false

oidcProvider:
  correlateSession: true
  cache: oidc-provider-cache
  discovery:
    issuer: https://auth.orchestrator.lab
    endpoints:
      wellKnown: https://auth.orchestrator.lab/.well-known/oauth-authorization-server
      jwks: https://auth.orchestrator.lab/oauth2/jwks
      auth: https://auth.orchestrator.lab/oauth2/auth
      token: https://auth.orchestrator.lab/oauth2/token
      userinfo: https://auth.orchestrator.lab/oauth2/userinfo
      introspect: https://auth.orchestrator.lab/oauth2/introspect
  jwks:
    - algorithm: RSA256
      publicKey: <ai_identity_gateway.oidc_signing_public_key>
      privateKey: <ai_identity_gateway.oidc_signing_private_key>

apps:
  # Public client for Claude Code, Cursor, and other CLI/IDE MCP clients.
  # mcp-remote takes a port as its second positional arg and uses that for
  # the local OAuth callback server, so each MCP client tool may pin a
  # different port — they all need entries here.
  - name: mcp-client-cli
    type: oidc
    clientID: mcp-client-cli
    public: true
    redirectURLs:
      - http://localhost:19876/callback
      - http://127.0.0.1:19876/callback
      - http://localhost:3334/oauth/callback
      - http://127.0.0.1:3334/oauth/callback
      # Cursor (mcp-remote port 3335). Same convention as mcp-client-cli-snowflake.
      - http://localhost:3335/oauth/callback
      - http://127.0.0.1:3335/oauth/callback
    # Inject the user's email into the access-token JWT. claimsMapping below
    # populates ID tokens / userinfo only; resource servers like Snowflake
    # that match identity off access-token claims need this here. The
    # downstream mcpBridge token exchange (ai-identity-gateway) reads this
    # `email` out of the subject_token and forwards it on the exchanged JWT.
    buildAccessTokenClaimsSE:
      funcName: BuildMCPClientAccessTokenClaims
      file: /etc/maverics/service-extensions/mcp-client-claims.go
    authentication:
      idps:
        - keycloak
    accessToken:
      type: jwt
    allowedAudiences:
      - https://gateway.orchestrator.lab/
    customScopes:
      scopes:
        - name: pii:read
        - name: audit:read
    claimsMapping:
      email: keycloak.email
      name: keycloak.email
      family_name: keycloak.family_name
      given_name: keycloak.given_name

  # MCP client variant bound to Snowflake's managed MCP audience.
  #
  # Mint flow: the MCP client (Claude Desktop, Claude Code, Cursor, …)
  # authenticates as mcp-client-cli-snowflake against the OIDC Provider;
  # tokens issued here carry `aud` resolvable to the Snowflake account URL.
  # Snowflake's EXTERNAL_OAUTH_INTEGRATION validates the JWT against this
  # OIDC Provider's JWKS and uses the `sub` claim to map to a Snowflake user.
  #
  # Two pieces are wired on this app that the existing mcp-client-cli does
  # not use:
  #   1. buildAccessTokenClaimsSE — Go Service Extension that injects
  #      agent_type, agent_provider, agent_instance_id, delegation_purpose
  #      into the JWT.
  #   2. tokenMinting OPA policy — gates the mint on the requested scope
  #      including a session:role:* binding so only Snowflake-bound tokens
  #      issue through this client.
  #
  # Confidential client (has a secret) so the demo script can drive the
  # client_credentials grant non-interactively. The authorization_code +
  # PKCE grant is also enabled for Claude Desktop / interactive MCP clients
  # — see `apps/snowflake/README.md`.
  - name: mcp-client-cli-snowflake
    type: oidc
    clientID: mcp-client-cli-snowflake
    credentials:
      secrets:
        - <mcp_client_cli_snowflake.client_secret>
    authentication:
      idps:
        - keycloak
    grantTypes:
      - authorization_code
      - refresh_token
      - client_credentials
    redirectURLs:
      - http://localhost:19876/callback
      - http://127.0.0.1:19876/callback
      - http://localhost:3334/oauth/callback
      - http://127.0.0.1:3334/oauth/callback
      # Cursor (mcp-remote port 3335). Keep the Claude/Cursor ports distinct
      # so both can be configured at the same time without colliding.
      - http://localhost:3335/oauth/callback
      - http://127.0.0.1:3335/oauth/callback
    accessToken:
      type: jwt
    allowedAudiences:
      # Snowflake account URL — sourced from SNOWFLAKE_ACCOUNT_URL in .env via
      # secrets.yaml + vault seeding (see vault/seed.sh). Keep the URL out of
      # the committed config.
      - <snowflake.account_url>
      # mcp-remote sends the full managed-MCP endpoint URL as the `resource=`
      # parameter on the token request, so we allow that exact value too.
      - <snowflake.mcp_resource_url>
      # The local AI Identity Gateway uses this audience when minting JWTs the
      # gateway itself validates — enables the optional bridge-mode workaround
      # described in optional/snowflake-bridge-workaround/.
      - https://gateway.orchestrator.lab/
    customScopes:
      scopes:
        # Snowflake EXTERNAL_OAUTH parses the scope claim, strips the
        # `session:role:` prefix, and looks up the resulting role name in
        # EXTERNAL_OAUTH_ALLOWED_ROLES_LIST. The colon-colon form is what
        # Custom External OAuth expects.
        - name: session:role:MAVERICS_DEMO_ROLE
        # Logical per-tool scopes carried alongside the role binding so
        # downstream policies (masking, row-access) can read agent intent
        # directly from the JWT.
        - name: snowflake:cortex_analyst
        - name: snowflake:cortex_search
        - name: snowflake:sql_execution
    claimsMapping:
      email: keycloak.email
      name: keycloak.email
      family_name: keycloak.family_name
      given_name: keycloak.given_name
      sub: keycloak.sub
    authorization:
      # Request-level authorization (allow any authenticated caller to ask
      # for a token; the OPA policy below gates whether the mint succeeds).
      allowAll: true
      tokenMinting:
        accessToken:
          policies:
            - name: snowflake-token-minting
              file: /etc/maverics/policies/snowflake-token-minting.rego
    buildAccessTokenClaimsSE:
      funcName: BuildAccessTokenClaims
      file: /etc/maverics/service-extensions/agent-claims.go

  # AI Identity Gateway client for RFC 8693 token exchange
  - name: ai-identity-gateway
    type: oidc
    clientID: ai-identity-gateway
    credentials:
      secrets:
        - <ai_identity_gateway.oidc_client_secret>
    authentication:
      idps:
        - keycloak
    grantTypes:
      - client_credentials
      - urn:ietf:params:oauth:grant-type:token-exchange
    accessToken:
      type: jwt
    # Used by the optional Snowflake mcpBridge workaround described in
    # optional/snowflake-bridge-workaround/. The SE looks up the user's
    # session, extracts `keycloak.email`, and injects it as the `email`
    # claim on every JWT this client mints — including the JWTs produced
    # via RFC 8693 delegation token exchange that the bridge sends to
    # Snowflake's `/api/v2/statements`. Maverics' declarative `claimsMapping`
    # populates ID tokens and userinfo by OIDC convention but does not
    # write to the access-token JWT, so resource servers that match
    # identity off access-token claims need the SE. Safe to leave wired
    # even when the bridge workaround is off — the SE returns nothing on
    # grants without a session.
    buildAccessTokenClaimsSE:
      funcName: BuildAIGAccessTokenClaims
      file: /etc/maverics/service-extensions/aig-claims.go
    allowedAudiences:
      - https://employee-directory.orchestrator.lab/
      - https://enterprise-ledger.orchestrator.lab/
      # Required for the optional Snowflake mcpBridge workaround so the
      # AI Identity Gateway can mint Snowflake-audience JWTs via RFC 8693
      # delegation token exchange. Pulled from SNOWFLAKE_ACCOUNT_URL in .env.
      - <snowflake.account_url>
    customScopes:
      scopes:
        # Employee Directory scopes
        - name: employee:List
        - name: employee:Get
        - name: employee:Create
        - name: employee:Update
        - name: employee:Deactivate
        - name: department:List
        # Enterprise Ledger scopes (standard)
        - name: ledger:ListAccounts
        - name: ledger:GetAccount
        - name: ledger:ListTransactions
        - name: ledger:UpdateAccount
        # Enterprise Ledger scopes (sensitive)
        - name: ledger:ReadPII
        - name: ledger:ReadAudit
        # Required for the optional Snowflake mcpBridge workaround — the
        # `session:role:` prefix is the Custom EXTERNAL_OAUTH convention
        # for role activation; the per-tool scope flows into the JWT
        # alongside the role binding.
        - name: session:role:MAVERICS_DEMO_ROLE
        - name: snowflake:sql_execution
    claimsMapping:
      email: keycloak.email
      name: keycloak.email
      sub: keycloak.sub
