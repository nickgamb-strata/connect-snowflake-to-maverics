<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 600" font-family="'SF Mono', 'Fira Code', 'Consolas', monospace" font-size="11">
  <defs>
    <marker id="arr-cyan" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#00CFC7"/>
    </marker>
    <marker id="arr-blue" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#79c0ff"/>
    </marker>
    <marker id="arr-light" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#AD83FF"/>
    </marker>
    <marker id="arr-gold" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#FEE03B"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1100" height="600" fill="#0D172E" rx="8"/>

  <!-- Title -->
  <text x="550" y="36" text-anchor="middle" fill="#FEE03B" font-size="16" font-weight="bold">Snowflake federated agent identity — with Maverics</text>
  <text x="550" y="56" text-anchor="middle" fill="#8899aa" font-size="11">Snowflake trusts Maverics-issued JWTs. Agent identity travels with the token. Maverics is not in the data path on tool calls.</text>

  <!-- ============ Three primary zones ============ -->

  <!-- Claude Desktop / MCP client (left) -->
  <rect x="40" y="120" width="240" height="140" rx="8" fill="#AD83FF" fill-opacity="0.10" stroke="#AD83FF" stroke-width="2"/>
  <text x="160" y="148" text-anchor="middle" fill="#AD83FF" font-size="13" font-weight="bold">Claude Desktop · MCP client</text>
  <text x="160" y="170" text-anchor="middle" fill="#8899aa" font-size="10">via mcp-remote (OAuth + PKCE)</text>
  <text x="160" y="195" text-anchor="middle" fill="#8899aa" font-size="10">Browser-driven OAuth on first</text>
  <text x="160" y="210" text-anchor="middle" fill="#8899aa" font-size="10">use; JWT cached per session.</text>
  <text x="160" y="235" text-anchor="middle" fill="#8899aa" font-size="9" font-style="italic">Same client config pattern works</text>
  <text x="160" y="248" text-anchor="middle" fill="#8899aa" font-size="9" font-style="italic">for Claude Code, Cursor, …</text>

  <!-- Maverics (center) -->
  <rect x="370" y="120" width="280" height="140" rx="8" fill="#00CFC7" fill-opacity="0.12" stroke="#00CFC7" stroke-width="2.5"/>
  <text x="510" y="148" text-anchor="middle" fill="#00CFC7" font-size="14" font-weight="bold">Maverics</text>
  <text x="510" y="166" text-anchor="middle" fill="#8899aa" font-size="10">OAuth Authorization Server</text>

  <rect x="385" y="180" width="250" height="65" rx="5" fill="#FEE03B" fill-opacity="0.06" stroke="#FEE03B" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="510" y="198" text-anchor="middle" fill="#FEE03B" font-size="10" font-weight="bold">JWT enriched with agent claims</text>
  <text x="510" y="214" text-anchor="middle" fill="#8899aa" font-size="9">agent_type · agent_provider</text>
  <text x="510" y="228" text-anchor="middle" fill="#8899aa" font-size="9">agent_instance_id · delegation_purpose</text>
  <text x="510" y="242" text-anchor="middle" fill="#8899aa" font-size="9">scope = session:role:MAVERICS_DEMO_ROLE</text>

  <!-- Snowflake (right) -->
  <rect x="740" y="120" width="320" height="140" rx="8" fill="#79c0ff" fill-opacity="0.10" stroke="#79c0ff" stroke-width="2"/>
  <text x="900" y="148" text-anchor="middle" fill="#79c0ff" font-size="14" font-weight="bold">Snowflake</text>
  <text x="900" y="166" text-anchor="middle" fill="#8899aa" font-size="10">Managed MCP server + data</text>

  <rect x="755" y="180" width="290" height="65" rx="5" fill="#79c0ff" fill-opacity="0.06" stroke="#79c0ff" stroke-width="1"/>
  <text x="900" y="198" text-anchor="middle" fill="#79c0ff" font-size="10" font-weight="bold">EXTERNAL_OAUTH integration</text>
  <text x="900" y="214" text-anchor="middle" fill="#8899aa" font-size="9">trusts Maverics' issuer + JWKS</text>
  <text x="900" y="228" text-anchor="middle" fill="#8899aa" font-size="9">activates Snowflake role from JWT scope</text>
  <text x="900" y="242" text-anchor="middle" fill="#8899aa" font-size="9">policies read agent claims from JWT</text>

  <!-- ============ Flows ============ -->

  <!-- ① Bedrock → Maverics -->
  <line x1="280" y1="180" x2="365" y2="180" stroke="#AD83FF" stroke-width="2" marker-end="url(#arr-cyan)"/>
  <rect x="285" y="148" width="78" height="22" rx="3" fill="#FEE03B" fill-opacity="0.12" stroke="#FEE03B" stroke-width="1"/>
  <text x="324" y="163" text-anchor="middle" fill="#FEE03B" font-size="10" font-weight="bold">① mint JWT</text>

  <!-- ① return — Maverics → Bedrock -->
  <line x1="365" y1="220" x2="282" y2="220" stroke="#00CFC7" stroke-width="1.5" stroke-dasharray="6,3" marker-end="url(#arr-light)"/>
  <text x="324" y="237" text-anchor="middle" fill="#8899aa" font-size="9">Maverics-signed JWT</text>

  <!-- ② Bedrock holds JWT, calls Snowflake -->
  <path d="M 160 260 L 160 360 L 900 360 L 900 262" fill="none" stroke="#FEE03B" stroke-width="2" marker-end="url(#arr-blue)"/>
  <rect x="495" y="345" width="160" height="30" rx="4" fill="#0D172E" stroke="#FEE03B" stroke-width="1.5"/>
  <text x="575" y="364" text-anchor="middle" fill="#FEE03B" font-size="10" font-weight="bold">② call MCP tool with JWT</text>

  <!-- Trust setup (dashed line, Snowflake → Maverics JWKS) -->
  <path d="M 750 200 Q 700 90 600 100 Q 540 105 540 115" fill="none" stroke="#6f5eea" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arr-cyan)"/>
  <rect x="615" y="78" width="180" height="24" rx="3" fill="#6f5eea" fill-opacity="0.10" stroke="#6f5eea" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="705" y="94" text-anchor="middle" fill="#AD83FF" font-size="10">trust set up once · validates JWKS</text>

  <!-- ============ Bottom section: value props ============ -->

  <text x="550" y="420" text-anchor="middle" fill="#FEE03B" font-size="12" font-weight="bold" letter-spacing="1">WHY THIS MATTERS</text>

  <!-- Card 1 — Federated trust -->
  <rect x="40" y="440" width="245" height="120" rx="6" fill="#00CFC7" fill-opacity="0.05" stroke="#00CFC7" stroke-width="1"/>
  <text x="162" y="462" text-anchor="middle" fill="#00CFC7" font-size="11" font-weight="bold">One Tier-1 trust</text>
  <text x="162" y="486" text-anchor="middle" fill="#8899aa" font-size="9">Snowflake trusts Maverics once.</text>
  <text x="162" y="500" text-anchor="middle" fill="#8899aa" font-size="9">Every agent platform that speaks</text>
  <text x="162" y="514" text-anchor="middle" fill="#8899aa" font-size="9">OAuth federates through that</text>
  <text x="162" y="528" text-anchor="middle" fill="#8899aa" font-size="9">single integration — no bespoke</text>
  <text x="162" y="542" text-anchor="middle" fill="#8899aa" font-size="9">onboarding per platform.</text>

  <!-- Card 2 — Agent identity preserved -->
  <rect x="305" y="440" width="245" height="120" rx="6" fill="#FEE03B" fill-opacity="0.05" stroke="#FEE03B" stroke-width="1"/>
  <text x="427" y="462" text-anchor="middle" fill="#FEE03B" font-size="11" font-weight="bold">Agent identity in the JWT</text>
  <text x="427" y="486" text-anchor="middle" fill="#8899aa" font-size="9">Maverics injects agent_type,</text>
  <text x="427" y="500" text-anchor="middle" fill="#8899aa" font-size="9">agent_provider, agent_instance_id,</text>
  <text x="427" y="514" text-anchor="middle" fill="#8899aa" font-size="9">delegation_purpose into every</text>
  <text x="427" y="528" text-anchor="middle" fill="#8899aa" font-size="9">token. Snowflake policies can</text>
  <text x="427" y="542" text-anchor="middle" fill="#8899aa" font-size="9">read those claims directly.</text>

  <!-- Card 3 — Not in data path -->
  <rect x="570" y="440" width="245" height="120" rx="6" fill="#79c0ff" fill-opacity="0.05" stroke="#79c0ff" stroke-width="1"/>
  <text x="692" y="462" text-anchor="middle" fill="#79c0ff" font-size="11" font-weight="bold">Maverics out of the way</text>
  <text x="692" y="486" text-anchor="middle" fill="#8899aa" font-size="9">After the JWT is issued, the agent</text>
  <text x="692" y="500" text-anchor="middle" fill="#8899aa" font-size="9">talks to Snowflake's MCP directly.</text>
  <text x="692" y="514" text-anchor="middle" fill="#8899aa" font-size="9">Maverics is not a bottleneck or a</text>
  <text x="692" y="528" text-anchor="middle" fill="#8899aa" font-size="9">third hop on every tool call —</text>
  <text x="692" y="542" text-anchor="middle" fill="#8899aa" font-size="9">just a trust anchor at the edge.</text>

  <!-- Card 4 — Standards on both sides -->
  <rect x="835" y="440" width="225" height="120" rx="6" fill="#AD83FF" fill-opacity="0.05" stroke="#AD83FF" stroke-width="1"/>
  <text x="947" y="462" text-anchor="middle" fill="#AD83FF" font-size="11" font-weight="bold">Standards-aligned</text>
  <text x="947" y="486" text-anchor="middle" fill="#8899aa" font-size="9">OAuth 2.0 client_credentials,</text>
  <text x="947" y="500" text-anchor="middle" fill="#8899aa" font-size="9">JWT (RFC 7519), JWKS,</text>
  <text x="947" y="514" text-anchor="middle" fill="#8899aa" font-size="9">EXTERNAL_OAUTH on Snowflake.</text>
  <text x="947" y="528" text-anchor="middle" fill="#8899aa" font-size="9">No vendor-specific protocol or</text>
  <text x="947" y="542" text-anchor="middle" fill="#8899aa" font-size="9">SDK on either side.</text>
</svg>
