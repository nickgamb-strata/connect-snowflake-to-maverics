    value: 9c4e7a2d1b8f5e3c6a0d9f2b4e7c1a5d

  # OAuth client used to mint JWTs bound to the Snowflake managed-MCP audience.
  # Confidential so the demo script can drive client_credentials non-interactively;
  # also supports authorization_code + PKCE for Claude Desktop. Rotate before
  # publishing this repo with your own value.
  mcp_client_cli_snowflake.client_secret:
    value: 9Q2mK7vN4xP8aL5jR3tH6mD1bF3sZcUgZ

  # Snowflake account URL (no trailing slash on the bare form) — pulled from
  # SNOWFLAKE_ACCOUNT_URL in .env at vault-seed time by scripts/seed.sh. Keep
  # the literal `${SNOWFLAKE_ACCOUNT_URL}` placeholder here; the real value
  # never gets committed to git.
  snowflake.account_url:
    value: ${SNOWFLAKE_ACCOUNT_URL}/

  # Snowflake managed-MCP resource URL — mcp-remote sends this verbatim as
  # the `resource=` parameter on the token request, so the OIDC client needs
  # it in its allowedAudiences list. Composed off the bare account URL +
  # the static managed-MCP path that setup.sql provisions.
  snowflake.mcp_resource_url:
    value: ${SNOWFLAKE_ACCOUNT_URL}/api/v2/databases/MAVERICS_DEMO/schemas/MCP/mcp-servers/MAVERICS_AGENT_MCP
