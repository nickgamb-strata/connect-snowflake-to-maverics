admin:
  address:
    socket_address:
      address: 127.0.0.1
      port_value: 9901

static_resources:
  listeners:
  - address:
      socket_address:
        address: 0.0.0.0
        port_value: 443
    traffic_direction: OUTBOUND
    filter_chains:
    - filters:
      - name: envoy.filters.network.http_connection_manager
        typed_config:
          "@type": type.googleapis.com/envoy.extensions.filters.network.http_connection_manager.v3.HttpConnectionManager
          codec_type: AUTO
          stat_prefix: ingress_http_443
          access_log:
          - name: envoy.access_loggers.stdout
            typed_config:
              "@type": type.googleapis.com/envoy.extensions.access_loggers.stream.v3.StdoutAccessLog
          route_config:
            name: proxy_routes_443
            virtual_hosts:
            - name: oidc-provider
              domains:
              - "auth.orchestrator.lab"
              - "auth.orchestrator.lab:*"
              routes:
              - match:
                  prefix: "/"
                route:
                  cluster: oidc_provider_cluster
            - name: ai-identity-gateway
              domains:
              - "gateway.orchestrator.lab"
              - "gateway.orchestrator.lab:*"
              routes:
              - match:
                  prefix: "/"
                route:
                  cluster: ai_identity_gateway_cluster
          http_filters:
          - name: envoy.filters.http.router
            typed_config:
              "@type": type.googleapis.com/envoy.extensions.filters.http.router.v3.Router
      transport_socket:
        name: envoy.transport_sockets.tls
        typed_config:
          "@type": type.googleapis.com/envoy.extensions.transport_sockets.tls.v3.DownstreamTlsContext
          common_tls_context:
            tls_certificates:
            - certificate_chain: {filename: "/usr/local/certs/edge-server.pem"}
              private_key: {filename: "/usr/local/certs/edge-server-key.pem"}
            validation_context:
              trusted_ca: {filename: "/usr/local/certs/rootCA.pem"}
  - address:
      socket_address:
        address: 0.0.0.0
        port_value: 9443
    traffic_direction: OUTBOUND
    filter_chains:
    - filters:
      - name: envoy.filters.network.http_connection_manager
        typed_config:
          "@type": type.googleapis.com/envoy.extensions.filters.network.http_connection_manager.v3.HttpConnectionManager
          codec_type: AUTO
          stat_prefix: ingress_http
          access_log:
          - name: envoy.access_loggers.stdout
            typed_config:
              "@type": type.googleapis.com/envoy.extensions.access_loggers.stream.v3.StdoutAccessLog
          route_config:
            name: proxy_routes
            virtual_hosts:
            - name: oidc-provider
              domains:
              - "auth.orchestrator.lab"
              - "auth.orchestrator.lab:*"
              routes:
              - match:
                  prefix: "/"
                route:
                  cluster: oidc_provider_cluster
            - name: ai-identity-gateway
              domains:
              - "gateway.orchestrator.lab"
              - "gateway.orchestrator.lab:*"
              routes:
              - match:
                  prefix: "/"
                route:
                  cluster: ai_identity_gateway_cluster
          http_filters:
          - name: envoy.filters.http.router
            typed_config:
              "@type": type.googleapis.com/envoy.extensions.filters.http.router.v3.Router
      transport_socket:
        name: envoy.transport_sockets.tls
        typed_config:
          "@type": type.googleapis.com/envoy.extensions.transport_sockets.tls.v3.DownstreamTlsContext
          common_tls_context:
            tls_certificates:
            - certificate_chain: {filename: "/usr/local/certs/edge-server.pem"}
              private_key: {filename: "/usr/local/certs/edge-server-key.pem"}
            validation_context:
              trusted_ca: {filename: "/usr/local/certs/rootCA.pem"}

  clusters:
  - name: oidc_provider_cluster
    type: STRICT_DNS
    lb_policy: ROUND_ROBIN
    load_assignment:
      cluster_name: oidc_provider_cluster
      endpoints:
      - lb_endpoints:
        - endpoint:
            address:
              socket_address:
                address: oidc-provider
                port_value: 9443
    transport_socket:
      name: envoy.transport_sockets.tls
      typed_config:
        "@type": type.googleapis.com/envoy.extensions.transport_sockets.tls.v3.UpstreamTlsContext
        sni: auth.orchestrator.lab
        common_tls_context:
          tls_certificates:
            - certificate_chain: {filename: "/usr/local/certs/internal-client.pem"}
              private_key: {filename: "/usr/local/certs/internal-client-key.pem"}
          validation_context:
            trusted_ca: {filename: "/usr/local/certs/rootCA.pem"}
  - name: ai_identity_gateway_cluster
    type: STRICT_DNS
    lb_policy: ROUND_ROBIN
    load_assignment:
      cluster_name: ai_identity_gateway_cluster
      endpoints:
      - lb_endpoints:
        - endpoint:
            address:
              socket_address:
                address: ai-identity-gateway
                port_value: 9443
    transport_socket:
      name: envoy.transport_sockets.tls
      typed_config:
        "@type": type.googleapis.com/envoy.extensions.transport_sockets.tls.v3.UpstreamTlsContext
        sni: gateway.orchestrator.lab
        common_tls_context:
          tls_certificates:
            - certificate_chain: {filename: "/usr/local/certs/internal-client.pem"}
              private_key: {filename: "/usr/local/certs/internal-client-key.pem"}
          validation_context:
            trusted_ca: {filename: "/usr/local/certs/rootCA.pem"}
